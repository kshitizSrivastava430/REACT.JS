<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple Interest Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h2>Simple Interest Calculator</h2>

    <input type="number" id="principal" placeholder="Enter Principal">

    <div id="result"></div>
</div>

<script src="script.js"></script>
</body>
</html>
